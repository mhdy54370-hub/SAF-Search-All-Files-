name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Download your repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java 17 (required by Android build tools)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Install Gradle and generate the wrapper scripts
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4. Build the debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. Upload APK so you can download it from the Actions tab
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAF-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
